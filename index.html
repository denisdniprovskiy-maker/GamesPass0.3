<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GamePass Time Tracker</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>GamePass Time Tracker 0.31</h1>
      <p class="subtitle">Log your working and gaming time to see your balance.</p>
    </header>

    <main>
      <section class="balance">
        <h2>Gaming Time Balance</h2>
        <div id="balanceIndicator" class="indicator">
          <span id="balanceValue">0</span>
          <span class="unit">min</span>
        </div>
        <p class="hint">Positive balance means earned gaming minutes; negative means owed gaming minutes.</p>
      </section>

      <section class="entry">
        <div class="entry-row">
          <label for="workInput">Working time (minutes)</label>
          <input id="workInput" type="number" min="1" placeholder="e.g., 60" />
          <button id="workBtn">Log Working Time</button>
        </div>

        <div class="entry-row">
          <label for="taskIdInput">Task ID (UUID)</label>
          <input id="taskIdInput" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
        </div>

        <div class="entry-row">
          <label for="gameInput">Gaming time (minutes)</label>
          <input id="gameInput" type="number" min="1" placeholder="e.g., 30" />
          <button id="gameBtn">Log Gaming Time</button>
        </div>

        <div class="actions">
          <button id="resetBtn" class="secondary">Reset Balance</button>
        </div>

        <div class="actions">
          <button id="exportBtn" class="secondary"> Download Balance (JSON)</button>
          <button id="importBtn" class="secondary"> Load Balance (JSON)</button>
          <input id="importInput" type="file" accept="application/json" hidden />
        </div>

        <div class="actions">
          <button id="showLogBtn" class="secondary">Show Log</button>
        </div>
      </section>

      <section id="logSection" class="log" style="display: none;">
        <h3>Transaction Log</h3>
        <div id="logContent"></div>
      </section>
    </main>

    <footer>
      <p>Saved in your browser using localStorage.</p>
    </footer>
  </div>

  <script src="src/app.js"></script>
</body>
</html>
